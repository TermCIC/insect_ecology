<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your Knowledge Tree</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #cfe8cf;
        }

        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, .25);
            z-index: 100;
        }

        h2 {
            margin-top: 0;
            color: #245b4f;
        }

        button {
            width: 100%;
            margin: 4px 0;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #245b4f;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #173d35;
        }

        #xp {
            font-weight: bold;
            margin-bottom: 10px;
        }

        #message {
            margin-top: 10px;
            min-height: 80px;
        }

        @media (max-width: 720px) {
            body {
                overflow: auto;
            }

            #ui {
                left: 12px;
                right: 12px;
                top: 12px;
                width: auto;
                padding: 12px;
            }

            h2 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <div id="ui">

        <h2>🌳 Build Your Knowledge Tree</h2>

        <div id="xp">XP: 0</div>

        <p>
            Build your scientific knowledge tree.
            Avoid unrelated branches.
        </p>

        <div id="choices"></div>

        <div id="message">
            Start with Observation.
        </div>

    </div>

    <script type="module">

        import * as THREE from "https://unpkg.com/three@0.167.1/build/three.module.js";

        /* ==========================
           Scene
        ========================== */

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xcfe8cf);

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        camera.position.set(0, 4.8, 11);
        camera.lookAt(0, 2.5, 0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true
        });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        document.body.appendChild(
            renderer.domElement
        );

        /* ==========================
           Lights
        ========================== */

        scene.add(
            new THREE.AmbientLight(
                0xffffff,
                1.8
            )
        );

        const sun =
            new THREE.DirectionalLight(
                0xffffff,
                2
            );

        sun.position.set(
            10,
            20,
            10
        );

        scene.add(sun);

        /* ==========================
           Ground
        ========================== */

        const ground =
            new THREE.Mesh(

                new THREE.CircleGeometry(
                    10,
                    64
                ),

                new THREE.MeshStandardMaterial({
                    color: 0x68a868
                })

            );

        ground.rotation.x =
            -Math.PI / 2;

        scene.add(ground);

        /* ==========================
           Seed
        ========================== */

        const seed =
            new THREE.Mesh(

                new THREE.SphereGeometry(
                    0.15,
                    16,
                    16
                ),

                new THREE.MeshStandardMaterial({
                    color: 0x5a3925
                })

            );

        seed.position.y = 0.13;
        scene.add(seed);

        /* ==========================
           Tree Trunk
        ========================== */

        const tree =
            new THREE.Group();

        scene.add(tree);

        const trunk =
            new THREE.Mesh(

                new THREE.CylinderGeometry(
                    0.16,
                    0.32,
                    1,
                    18
                ),

                new THREE.MeshStandardMaterial({
                    color: 0x8b5a2b
                })

            );

        trunk.castShadow = true;

        tree.add(trunk);

        /* ==========================
           Branches and Leaves
        ========================== */

        const branchMaterial =
            new THREE.MeshStandardMaterial({
                color: 0x6f4523
            });

        const leafMaterials = [
            new THREE.MeshStandardMaterial({
                color: 0x2f8f46
            }),
            new THREE.MeshStandardMaterial({
                color: 0x4fa85f
            }),
            new THREE.MeshStandardMaterial({
                color: 0x1f6f36
            })
        ];

        const branches =
            new THREE.Group();

        const leafClusters =
            new THREE.Group();

        tree.add(branches);
        tree.add(leafClusters);

        const branchPlans = [
            { start: [-0.02, 1.15, 0], end: [-1.25, 2.0, 0.15], radius: 0.07 },
            { start: [0.04, 1.45, 0.02], end: [1.28, 2.38, -0.08], radius: 0.07 },
            { start: [-0.02, 1.85, -0.03], end: [-0.92, 3.0, -0.55], radius: 0.055 },
            { start: [0.02, 2.1, 0.03], end: [0.95, 3.18, 0.5], radius: 0.055 },
            { start: [0, 2.55, 0], end: [0.12, 3.85, 0.08], radius: 0.05 }
        ];

        function makeBranch(startArray, endArray, radius) {

            const start =
                new THREE.Vector3().fromArray(startArray);

            const end =
                new THREE.Vector3().fromArray(endArray);

            const direction =
                new THREE.Vector3().subVectors(end, start);

            const length =
                direction.length();

            const branch =
                new THREE.Group();

            const branchSegment =
                new THREE.Mesh(

                    new THREE.CylinderGeometry(
                        radius * 0.55,
                        radius,
                        length,
                        10
                    ),

                    branchMaterial

                );

            branchSegment.position.y =
                length / 2;

            branch.position.copy(start);

            branch.quaternion.setFromUnitVectors(
                new THREE.Vector3(0, 1, 0),
                direction.clone().normalize()
            );

            branch.add(branchSegment);

            return branch;

        }

        function makeLeafCluster(centerArray, scale) {

            const cluster =
                new THREE.Group();

            const offsets = [
                [0, 0, 0],
                [0.24, 0.05, 0.05],
                [-0.22, 0.02, -0.06],
                [0.05, 0.2, -0.16],
                [-0.02, -0.12, 0.18]
            ];

            offsets.forEach((offset, index) => {

                const leaf =
                    new THREE.Mesh(

                        new THREE.SphereGeometry(
                            0.34 * scale,
                            18,
                            18
                        ),

                        leafMaterials[index % leafMaterials.length]

                    );

                leaf.position.set(
                    offset[0] * scale,
                    offset[1] * scale,
                    offset[2] * scale
                );

                leaf.scale.set(
                    1.25,
                    0.82,
                    1.05
                );

                cluster.add(leaf);

            });

            cluster.position.fromArray(centerArray);
            return cluster;

        }

        branchPlans.forEach(plan => {

            const branch =
                makeBranch(
                    plan.start,
                    plan.end,
                    plan.radius
                );

            branch.userData.growthStart =
                plan.start[1] / 4.2;

            branch.userData.fullScale =
                branch.scale.clone();

            branches.add(branch);

            const leaves =
                makeLeafCluster(
                    plan.end,
                    plan.radius > 0.06 ? 1 : 0.9
                );

            leaves.userData.growthStart =
                branch.userData.growthStart + 0.08;

            leaves.userData.fullScale =
                leaves.scale.clone();

            leafClusters.add(leaves);

        });

        const canopy =
            new THREE.Mesh(

                new THREE.SphereGeometry(
                    1.15,
                    32,
                    32
                ),

                new THREE.MeshStandardMaterial({
                    color: 0x2c8a45,
                    roughness: 0.8
                })

            );

        canopy.position.set(0, 4.15, 0.05);
        canopy.scale.set(0.01, 0.01, 0.01);
        leafClusters.add(canopy);

        /* ==========================
           Game Data
        ========================== */

        const correctStages = [

            "Observation",
            "Hypothesis",
            "Experiment",
            "Analysis",
            "Discussion",
            "Publication"

        ];

        const wrongStages = [

            "Fake Data",
            "Trust Me Bro",
            "No Statistics",
            "Plagiarism",
            "ChatGPT Everything"

        ];

        let currentStep = 0;
        let xp = 0;

        /* ==========================
           UI
        ========================== */

        const choices =
            document.getElementById(
                "choices"
            );

        const xpDiv =
            document.getElementById(
                "xp"
            );

        const message =
            document.getElementById(
                "message"
            );

        function refreshButtons() {

            choices.innerHTML = "";

            const options = [

                correctStages[currentStep],
                ...wrongStages

            ];

            options.sort(
                () => Math.random() - 0.5
            );

            options.forEach(text => {

                const btn =
                    document.createElement(
                        "button"
                    );

                btn.innerText = text;

                btn.onclick =
                    () => choose(text);

                choices.appendChild(btn);

            });

        }

        refreshButtons();

        /* ==========================
           Tree Growth
        ========================== */

        function growTree() {

            const p =
                (currentStep + 1) /
                correctStages.length;

            const trunkHeight =
                0.35 + p * 3.85;

            trunk.scale.set(
                0.75 + p * 0.35,
                trunkHeight,
                0.75 + p * 0.35
            );

            trunk.position.y =
                trunkHeight / 2;

            const canopyScale =
                THREE.MathUtils.smoothstep(
                    p,
                    0.46,
                    1
                );

            canopy.scale.set(
                0.15 + canopyScale * 1.05,
                0.12 + canopyScale * 0.88,
                0.15 + canopyScale * 1.05
            );

            canopy.position.y =
                trunkHeight + 0.1;

            branches.children.forEach(branch => {

                const amount =
                    THREE.MathUtils.smoothstep(
                        p,
                        branch.userData.growthStart,
                        branch.userData.growthStart + 0.22
                    );

                branch.visible =
                    amount > 0.02;

                branch.scale.set(
                    amount,
                    amount,
                    amount
                );

            });

            leafClusters.children.forEach(cluster => {

                if (cluster === canopy) {
                    return;
                }

                const amount =
                    THREE.MathUtils.smoothstep(
                        p,
                        cluster.userData.growthStart,
                        cluster.userData.growthStart + 0.24
                    );

                cluster.visible =
                    amount > 0.02;

                cluster.scale.set(
                    amount,
                    amount,
                    amount
                );

            });
        }

        growTree();

        /* ==========================
           Professor Prune
        ========================== */

        function professorPrune() {

            let count = 0;

            const shake =
                setInterval(() => {

                    tree.rotation.z =
                        (Math.random() - 0.5) * 0.25;

                    count++;

                    if (count > 15) {

                        clearInterval(shake);

                        tree.rotation.z = 0;

                    }

                }, 30);

        }

        /* ==========================
           Publication Fruits
        ========================== */

        function createPublicationFruit() {

            for (let i = 0; i < 15; i++) {

                const fruit =
                    new THREE.Mesh(

                        new THREE.BoxGeometry(
                            0.25,
                            0.35,
                            0.03
                        ),

                        new THREE.MeshStandardMaterial({
                            color: 0xffffff
                        })

                    );

                fruit.position.set(

                    (Math.random() - 0.5) * 3.2,

                    3 + Math.random() * 1.7,

                    (Math.random() - 0.5) * 2.4

                );

                scene.add(fruit);

            }

        }

        /* ==========================
           Graduation Hat
        ========================== */

        function createGraduationHat() {

            const hat =
                new THREE.Group();

            const top =
                new THREE.Mesh(

                    new THREE.BoxGeometry(
                        1.5,
                        0.1,
                        1.5
                    ),

                    new THREE.MeshStandardMaterial({
                        color: 0x111111
                    })

                );

            const base =
                new THREE.Mesh(

                    new THREE.BoxGeometry(
                        0.6,
                        0.3,
                        0.6
                    ),

                    new THREE.MeshStandardMaterial({
                        color: 0x111111
                    })

                );

            base.position.y =
                -0.15;

            hat.add(top);
            hat.add(base);

            hat.position.y = 5.7;

            scene.add(hat);

        }

        /* ==========================
           Victory
        ========================== */

        function winGame() {

            choices.innerHTML = "";

            message.innerHTML =

                "🎓 Congratulations!<br><br>" +

                "You have built your Knowledge Tree.<br><br>" +

                "Observation → Hypothesis → Experiment → Analysis → Discussion → Publication<br><br>" +

                "The job of professor is to cut unrelated branches.";

            createPublicationFruit();

            createGraduationHat();

        }

        /* ==========================
           Choice Logic
        ========================== */

        function choose(text) {

            if (text === correctStages[currentStep]) {

                xp += 20;

                xpDiv.innerHTML =
                    "XP: " + xp;

                growTree();

                message.innerHTML =

                    "✅ Correct!<br>" +

                    text +

                    "<br><br>Your knowledge tree grows.";

                currentStep++;

                if (
                    currentStep <
                    correctStages.length
                ) {

                    refreshButtons();

                } else {

                    winGame();

                }

            } else {

                xp =
                    Math.max(
                        0,
                        xp - 10
                    );

                xpDiv.innerHTML =
                    "XP: " + xp;

                message.innerHTML =

                    "✂ Professor removed an unrelated branch:<br><b>" +

                    text +

                    "</b>";

                professorPrune();

            }

        }

        /* ==========================
           Animation
        ========================== */

        function animate() {

            requestAnimationFrame(
                animate
            );

            leafClusters.rotation.y +=
                0.002;

            renderer.render(
                scene,
                camera
            );

        }

        animate();

        /* ==========================
           Resize
        ========================== */

        window.addEventListener(
            "resize",
            () => {

                camera.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );

            }
        );

    </script>

</body>

</html>
