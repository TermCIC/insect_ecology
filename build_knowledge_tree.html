<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Build Your Knowledge Tree</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f8f5;
    text-align:center;
    margin:20px;
}

h1{
    color:#245b4f;
}

#tree{
    width:400px;
    margin:auto;
}

.node{
    background:white;
    border:2px solid #245b4f;
    border-radius:10px;
    padding:15px;
    margin:10px;
    cursor:move;
    font-weight:bold;
    box-shadow:0 2px 4px rgba(0,0,0,.15);
}

.node:hover{
    background:#eaf3ef;
}

button{
    background:#245b4f;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#173d35;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🌳 Build Your Knowledge Tree</h1>

<p>
Arrange the scientific process in the correct order.
</p>

<div id="tree">

<div class="node" draggable="true">Discussion</div>
<div class="node" draggable="true">Observation</div>
<div class="node" draggable="true">Publication</div>
<div class="node" draggable="true">Experiment</div>
<div class="node" draggable="true">Hypothesis</div>
<div class="node" draggable="true">Analysis</div>

</div>

<button onclick="checkAnswer()">
Check My Knowledge Tree
</button>

<div id="result"></div>

<script>

const tree = document.getElementById('tree');

let dragged;

document.addEventListener("dragstart", e=>{
    if(e.target.classList.contains("node")){
        dragged = e.target;
    }
});

document.addEventListener("dragover", e=>{
    e.preventDefault();
});

document.addEventListener("drop", e=>{
    e.preventDefault();

    if(e.target.classList.contains("node")){
        const rect = e.target.getBoundingClientRect();

        const next =
            (e.clientY - rect.top) >
            rect.height/2;

        tree.insertBefore(
            dragged,
            next ? e.target.nextSibling : e.target
        );
    }
});

function checkAnswer(){

    const correct = [
        "Observation",
        "Hypothesis",
        "Experiment",
        "Analysis",
        "Discussion",
        "Publication"
    ];

    const nodes =
        document.querySelectorAll(".node");

    let score = 0;

    nodes.forEach((node,i)=>{
        if(node.innerText === correct[i]){
            score++;
        }
    });

    if(score === correct.length){

        document.getElementById("result").innerHTML =
        "🎉 Perfect! You have built your Knowledge Tree.<br><br>" +
        "Observation → Hypothesis → Experiment → Analysis → Discussion → Publication";

    }else{

        document.getElementById("result").innerHTML =
        "Score: " + score +
        "/" + correct.length +
        "<br>Keep growing your Knowledge Tree!";
    }
}

window.onload = () => {

    const container =
        document.getElementById("tree");

    for(let i=container.children.length;i>=0;i--){
        container.appendChild(
            container.children[
                Math.random()*i|0
            ]
        );
    }
}

</script>

</body>
</html>
